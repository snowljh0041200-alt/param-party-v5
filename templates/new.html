{% extends "base.html" %}{% block body %}<section class="panel"><a class="btn gray" href="/">← 메인</a><h1>모집글 올리기</h1><form method="post" action="/create"><label>종류</label><select name="category" id="cat">{% for c in cats %}<option>{{ c }}</option>{% endfor %}</select>{% for cat, arr in places.items() %}<div class="place" data-cat="{{ cat }}"><label>장소</label><select name="place_{{ cat }}">{% for p in arr %}<option>{{ p }}</option>{% endfor %}</select></div>{% endfor %}<label>채널 4자리</label><input name="channel" maxlength="4" inputmode="numeric" placeholder="3385"><label>날짜</label><input name="date" type="date" value="{{ today() }}"><label>시작시간</label><div class="time-row"><select name="start_period"><option>오전</option><option>오후</option></select><input name="start_time" inputmode="numeric" maxlength="5" placeholder="1107"></div><label>종료시간</label><div class="time-row"><select name="end_period"><option>오전</option><option>오후</option></select><input name="end_time" inputmode="numeric" maxlength="5" placeholder="1120"></div><label>메모</label><textarea name="memo"></textarea><section class="panel" id="slotsBox"><h2>사냥 직업 자리 추가</h2><div class="toolbar"><select id="slotJob">{% for j in jobs %}<option>{{ j }}</option>{% endfor %}</select><button type="button" class="ok" onclick="addSlot()">추가</button></div><div id="slots"></div></section><div class="notice">600퀘/파밍은 참여 버튼 방식입니다.</div><button class="ok full">등록</button></form></section>{% endblock %}
