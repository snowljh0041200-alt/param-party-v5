{% extends "base.html" %}{% block body %}<section class="panel"><a class="btn gray" href="/">← 메인</a><h1>내 캐릭터</h1>{% for c in u.chars %}<div class="slot"><div><b>{{ c.name }}({{ c.job }})</b><br>{{ c.status }}</div>{% if c.status=="approved" %}<a class="mini ok" href="/select_char/{{ c.id }}">선택</a>{% endif %}</div>{% endfor %}<form method="post"><h2>캐릭터 추가</h2><input name="name" placeholder="캐릭터명"><select name="job">{% for j in jobs %}<option>{{ j }}</option>{% endfor %}</select><button class="ok">추가</button></form></section>{% endblock %}
