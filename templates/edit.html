{% extends "base.html" %}{% block body %}<section class="panel"><a class="btn gray" href="/">← 메인</a><h1>수정</h1><form method="post"><label>장소</label><input value="{{ p.place }}" disabled><label>채널</label><input name="channel" value="{{ p.channel }}"><label>날짜</label><input name="date" type="date" value="{{ p.date or today() }}"><label>시작시간</label><div class="time-row"><select name="start_period"><option {% if sp=="오전" %}selected{% endif %}>오전</option><option {% if sp=="오후" %}selected{% endif %}>오후</option></select><input name="start_time" value="{{ st }}" maxlength="5"></div><label>종료시간</label><div class="time-row"><select name="end_period"><option {% if ep=="오전" %}selected{% endif %}>오전</option><option {% if ep=="오후" %}selected{% endif %}>오후</option></select><input name="end_time" value="{{ et }}" maxlength="5"></div><label>메모</label><textarea name="memo">{{ p.memo }}</textarea><button class="ok full">저장</button></form></section>{% endblock %}
